<!DOCTYPE html>

    <title>FinStore - Productos Financieros Digitales</title>

</head>
<body>
    <header>
        <div class="container">
            <h1>🏦 FinStore</h1>

                <ul>

                    <li><a href="#">Productos</a></li>
                    <li><a href="#">Mi Carrito</a></li>
                    <li><a href="#">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h2>Productos financieros digitales para tu futuro</h2>
                <p>Inversiones, ahorro, cripto y más. Todo en un solo lugar.</p>

    <footer>
